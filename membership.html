<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Membership|PowerGym</title>
    </head>
    <body>
        <header>
            <h1>Membership plans</h1>
        </header>
        <main>
            <section>
                <article>
                    <h2>Bronze</h2>
                    <dl>
                        <dt>Duration</dt><dd>1 Month</dd>
                        <dt>Access</dt><dd>Gym Only</dd>
                    </dl>
                </article>
                <article>
                    <h2>Silver</h2>
                    <dl>
                        <dt>Duration</dt><dd>3 Months</dd>
                        <dt>Access</dt><dd>Gym + Classes</dd>
                        <dt></dt>
                    </dl>
                </article>
                <article>
                    <h2>Gold</h2>
                    <dl>
                        <dt>Duration</dt><dd>12 months</dd>
                        <dt>Access</dt><dd>All Services</dd>
                    </dl>
                </article>
            </section>
            <section>
                <h2>Register Now</h2>
                <form>
                    <fieldset>
                        <legend>personal Information</legend>
                        <label>Full Name:
                            <input type="text" name="fullname">
                        </label>
                        <label>Email:
                            <input type="email" name="email">
                        </label>
                        <label>Phone:
                            <input type="tel" name="phone">
                        </label>
                        <label>Date Of Birth:
                            <input type="date" name="dob">
                        </label>
                    </fieldset>
                    <fieldset>
                        <legend>Select Plan</legend>
                        <label><input type="radio" name="plan">Bronze
                        </label>
                        <label><input type="radio" name="plan">Silver
                        </label>
                        <label><input type="radio" name="plan">Gold
                        </label>
                    </fieldset>
                    <label>
                       <input type="checkbox"> I accept the terms   
                    </label>
                    <button type="submit">Submit</button>
                </form>
            </section>
        </main>

</html>
