<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | IMA Club</title>

    <link rel="stylesheet" href="style-admin-login.css">
</head>
<body class="login-body"> 

    <div class="login-card">
        <h1>Admin <span style="color:var(--primary-gold)">Login</span></h1>
        
        <form class="login-form" method="POST" action="admin-dashboard.html">
            <label>
                Username:
            
                <input type="text" name="username" placeholder="Enter your name" required>
            </label>
            
            <label>
                Password:
                <input type="password" name="password" required>
            </label>
            
            <button type="submit" class="login-btn">Login</button>
        </form>
        

        <p><a href="index.html" class="back-link">← Back to website</a></p>
    </div>

</body>
</html>
