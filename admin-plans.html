<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Manage Plans|PowerGym</title>
    </head>
    <body>
        <h1>Membership Plans Management</h1>
        <section>
            <h2>Existing Plans</h2>
            <table border="1">
                <tr>
                    <th>Plan Name</th>
                    <th>Price</th>
                    <th>Duration</th>
                    <th>Features</th>
                    <th>Actions</th>
                </tr>
                <tr>
                    <td>Bronze</td>
                    <td>3000 DA</td>
                    <td>1 Month</td>
                    <td>Gym Only</td>
                    <td>
                        <button type="button">Edit</button>
                        <button type="button">Delete</button>
                    </td>
                </tr>
                <tr>
                    <td>Silver</td>
                    <td>8000 DA</td>
                    <td>3 Months</td>
                    <td>Gym + Classes</td>
                    <td>
                        <button type="button">Edit</button>
                        <button type="button">Delete</button>
                    </td>
                </tr> 
                    <td>Gold</td>
                    <td>12000 DA</td>
                    <td>12 Months</td>
                    <td>All Services</td>
                    <td>
                        <button type="button">Edit</button>
                        <button type="button">Delete</button>
                    </td>
                </tr>

            </table>
        </section>
        <section>
            <h2>Add New Plan</h2>
            <form>
                <label>
                    Plan Name :
                    <input type="text">
                </label><br><br>
                 <label>
                    Price :
                    <input type="number">
                </label><br><br>
                 <label>
                    Duration :
                    <input type="text">
                </label><br><br> <label>
                    Description :
                    <textarea></textarea>
                </label><br><br>
                <button type="submit">Add Plan</button>
            </form>
        </section>
    </body>
</html>
